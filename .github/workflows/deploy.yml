# This GitHub Action automatically deploys our code to an AWS EC2 server
# whenever changes are pushed to the 'docker' branch.

name: Deploy

on:
  # Trigger this workflow when code is pushed to the 'docker' branch
  push:
    branches: [ "docker" ]
  # Allow running this workflow manually from the GitHub website
  workflow_dispatch:

jobs:
  deploy:
    # Run the deployment on a fresh Ubuntu virtual machine provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # 1. Download our repository's code onto the GitHub runner
    - uses: actions/checkout@v4
    
    # 2. Connect to our AWS EC2 Server via SSH and run commands
    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        # Note: The IDE might show a warning here, but this is correct syntax.
        # These secrets must be defined in the GitHub Repository Secrets settings!
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        
        # 3. The exact commands that will securely execute on our AWS server
        script: |
          # Go to our project folder, or clone it if it doesn't exist yet
          cd ~/DevOps || git clone https://github.com/mausam-005/DevOps.git ~/DevOps
          
          # Move into the folder so we can run our commands
          cd ~/DevOps
          
          # Fetch the latest changes from GitHub and switch to the 'docker' branch
          git fetch origin
          git checkout docker
          git pull origin docker
          
          # Run our existing setup script (which creates necessary folders like build_output)
          chmod +x scripts/setup.sh
          ./scripts/setup.sh
          
          # Build our new Docker images and start our containers in the background!
          # Using docker compose automatically handles stopping old versions and starting new ones.
          docker compose up -d --build