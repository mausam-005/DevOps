# Docker Compose configuration for math-utils and nginx proxy
# (Note: The 'version' attribute is obsolete in modern Docker Compose, so it has been removed)

services:
  # ---------------------------------------------
  # 1. Our Node.js Application (math-utils)
  # ---------------------------------------------
  math-utils:
    # Build the image using the Dockerfile in this directory
    build: .
    container_name: math-utils
    
    # Map port 3000 inside the container to port 3000 on the host machine
    ports:
      - "3000:3000"
      
    # Automatically restart the container if it crashes or if the server reboots
    restart: unless-stopped
    
    # Attach to our custom network so Nginx can talk to it using the name 'math-utils'
    networks:
      - app-network

  # ---------------------------------------------
  # 2. Our Nginx Reverse Proxy
  # ---------------------------------------------
  nginx:
    # Use the official Nginx image
    image: nginx
    container_name: nginx
    hostname: ce22aa4d9ea6
    
    # Standard Nginx environment variables
    environment:
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - NGINX_VERSION=1.29.6
      - NJS_VERSION=0.9.6
      - NJS_RELEASE=1~trixie
      - ACME_VERSION=0.3.1
      - PKG_RELEASE=1~trixie
      - DYNPKG_RELEASE=1~trixie
      
    # Open port 8080 on the server and route it to port 80 inside this Nginx container
    ports:
      - "8080:80"
    restart: "no"
    
    labels:
      - "maintainer=NGINX Docker Maintainers <docker-maint@nginx.com>"
      
    # Attach to the same network as our Node.js app
    networks:
      - app-network
      
    # Make sure the Node application starts up *before* Nginx tries to connect to it
    depends_on:
      - math-utils
      
    # Load our custom nginx.conf file into the container
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

# ---------------------------------------------
# 3. Internal Network
# ---------------------------------------------
networks:
  # A private bridge network allowing the containers to securely communicate
  app-network:
    driver: bridge
